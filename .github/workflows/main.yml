name: Enterprise CI/CD Demo

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies & Build
        run: |
          mkdir -p dist
          echo '<h1>Enterprise Build Successful!</h1>' > dist/index.html

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-assets
          path: dist/
          retention-days: 1

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          echo "All tests passed! ✅"

  deploy:
    name: Deploy to Mock Production
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: production-assets
          path: dist/

      - name: Simulate Cloud Deployment
        run: |
          echo "Connecting to production server..."
          echo "Deploying files from ./dist directory..."
          cat dist/index.html
          echo "Deployment completed successfully! 🎉"
